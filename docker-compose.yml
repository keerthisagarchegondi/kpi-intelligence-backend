version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: kpi-intelligence-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-kpi_intelligence}
      POSTGRES_USER: ${DB_USER:-kpiuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./db/queries.sql:/docker-entrypoint-initdb.d/02-queries.sql:ro
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-kpiuser} -d ${DB_NAME:-kpi_intelligence}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kpi-network

  # KPI Intelligence Backend API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kpi-intelligence-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Application settings
      APP_NAME: ${APP_NAME:-KPI Intelligence Backend}
      APP_VERSION: ${APP_VERSION:-1.0.0}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DEBUG: ${DEBUG:-false}
      
      # API settings
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-8000}
      
      # Database connection
      DATABASE_URL: postgresql://${DB_USER:-kpiuser}:${DB_PASSWORD:-changeme}@db:5432/${DB_NAME:-kpi_intelligence}
      
      # CORS settings
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8000}
      
      # Python settings
      PYTHONUNBUFFERED: 1
      PYTHONDONTWRITEBYTECODE: 1
    volumes:
      # Mount data directories for persistence
      - ./data/raw:/app/data/raw
      - ./data/processed:/app/data/processed
      - ./logs:/app/logs
    ports:
      - "${API_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - kpi-network
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --workers 4

# Volumes for data persistence
volumes:
  postgres_data:
    driver: local

# Network for service communication
networks:
  kpi-network:
    driver: bridge
